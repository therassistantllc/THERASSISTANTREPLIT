name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - artifacts/therassistant-ehr/**
      - .github/workflows/deploy-cloud-run.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'therassistant-ehr' }}
  REGION: ${{ vars.CLOUD_RUN_REGION || 'us-central1' }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION || 'us-central1' }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY || 'therassistant' }}
  MIN_INSTANCES: ${{ vars.CLOUD_RUN_MIN_INSTANCES || '0' }}
  MAX_INSTANCES: ${{ vars.CLOUD_RUN_MAX_INSTANCES || '3' }}

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key fallback)
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER == '' && secrets.GCP_SERVICE_ACCOUNT_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Fail if auth is not configured
        if: ${{ (secrets.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || secrets.GCP_SERVICE_ACCOUNT == '') && secrets.GCP_SERVICE_ACCOUNT_KEY == '' }}
        run: |
          echo "Missing Google auth secrets. Configure either:"
          echo "1) GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT"
          echo "or"
          echo "2) GCP_SERVICE_ACCOUNT_KEY"
          exit 1

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE_URI="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}/${SERVICE}:${SHA}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE_URI}" \
            --region "${REGION}" \
            --platform managed \
            --min-instances "${MIN_INSTANCES}" \
            --max-instances "${MAX_INSTANCES}" \
            --allow-unauthenticated
